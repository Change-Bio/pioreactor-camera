name: Build and Release

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: Check static files are up to date
        run: |
          if [ -n "$(git diff --name-only pioreactor_camera/static/)" ]; then
            echo "::error::Committed static files are out of date. Run 'cd frontend && npm run build' and commit the result."
            git diff --stat pioreactor_camera/static/
            exit 1
          fi

      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Build Python package
        run: |
          pip install build
          python -m build

      - name: Create release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
